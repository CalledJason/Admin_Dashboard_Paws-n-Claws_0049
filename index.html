<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws & Claws&#x1F43E; - Premium Pet Grooming Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pc-pink: #FFB7B2;
            --pc-peach: #FFDAC1;
            --pc-cream: #FFFDF9;
            --pc-dark: #3D3A3A;
            --pc-blue: #B5E2FA;

            --global-rounded: 30px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--pc-cream);
            color: var(--pc-dark);
            overflow-x: hidden;
        }
        .navbar {
            background-color: rgba(255, 253, 249, 0.95);
            backdrop-filter: blur(10px);
            margin-top: 10px;
            margin-left: 20px;
            margin-right: 20px;
            padding: 15px 0;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
        }
        .pc-rounded-box {
            border-radius: var(--global-rounded);
            overflow: hidden;
            box-shadow: 0 25px 60px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top pc-shadow">
        <div class="container">
            <a href="#" class="navbar-brand fw-bold" style="font-family: 'Poppins', sans-serif">
                <span style="color: var(--pc-pink);">Paws &</span> Claws&#x1F43E;
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
    <header id="hero">
        <div class="container">
            <div class="row align-items-center min-vh-75">
                <div class="col-lg-6 text-center text-lg-start mb-5 mb-lg-0">
                    <span class="badge pc-badge mb-3"><i class="fa-solid fa-star text-warning"></i>#1 Pet Salon in Town</span>
                    <h1 class="display-3 hero-title fw-bold mb-4">Where Every Fluff Gets a Royal <span style="color: var(--pc-pink);">Treatment!</span></h1>
                </div>
            </div>
            <div class="col-lg-6 mt-5 mt-lg-0 hero-img-box text-center">
                <div class="pc-rounded-box">
                    <img src="https://i.pinimg.com/736x/e5/da/c2/e5dac266f20f26c5d948844804e3f538.jpg" alt="Cute groomed dog" class="img-fluid w-100">
                </div>
            </div>
        </div>
    </header>

    <section id="about" class="py-5 bg-white">
        <div class="container py-4">
            <div class="row-align-items-center gap-5">
                <div class="col-lg05 text-center pc-rounded-box overflow-hidden shadow">
                    <img src="https://i.pinimg.com/1200x/98/5b/29/985b29078a15e147a29e5c4fe2fa4096.jpg" class="img-fluid w-100">
                </div>
            </div>
        </div>
    </section>

    <section id="services" class="py-5 text-center bg-light">
        <div class="container py-4">
            <h2 class="sectinon-title">Layanan Unggulan Kami</h2>
            <div class="row mt-4 justify-content-center g-4"></div>
        </div>
    </section>

    <section id="calculator" class="py-5 bg-white">
        <div class="container py-4">
            <div class="row justify-content-center align-items-center g-5">
                <div class="col-lg-6 card pc-card pc-shadow p-5 border-0">
                    <form id="calcForm"></form>
                    <div class="row mb-4">
                        <div class="col-md-6 mb-3">
                            <label class="form-label fw-bold">Jenis Peliharaan</label>
                            <select class="form-select" id="petType">
                                <option value="0" selected disabled>-- Pilih Hewan --</option>
                                <option value="cat">Kucing&#x1F408;</option>
                                <option value="dog">Anjing&#128021;</option>
                            </select>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

</body>
</html>
