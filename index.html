<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paws & Claws&#x1F43E; - Premium Pet Grooming Salon</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --pc-pink: #FFB7B2;
            --pc-peach: #FFDAC1;
            --pc-cream: #FFFDF9;
            --pc-dark: #3D3A3A;
            --pc-blue: #B5E2FA;

            --global-rounded: 30px;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background-color: var(--pc-cream);
            color: var(--pc-dark);
            overflow-x: hidden;
        }
        .navbar {
            background-color: rgba(255, 253, 249, 0.95);
            backdrop-filter: blur(10px);
            margin-top: 10px;
            margin-left: 20px;
            margin-right: 20px;
            padding: 15px 0;
            border-bottom-left-radius: 20px;
            border-bottom-right-radius: 20px;
            box-shadow: 0 5px 25px rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg fixed-top pc-shadow">
        <div class="container">
            <a href="#" class="navbar-brand fw-bold" style="font-family: 'Poppins', sans-serif">
                <span style="color: var(--pc-pink);">Paws &</span> Claws&#x1F43E;
            </a>
            <button class="navbar-toggler border-0 shadow-none" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
        </div>
    </nav>
    <header id="hero">
        <div class="container">
            <div class="row align-items-center min-vh-75">
                <div class="col-lg-6 text-center text-lg-start mb-5 mb-lg-0">
                    <span class="badge pc-badge mb-3"><i class="fa-solid fa-star text-warning"></i>#1 Pet Salon in Town</span>
                    <h1 class="display-3 hero-title fw-bold mb-4">Where Every Fluff Gets a Royal <span style="color: var(--pc-pink);">Treatment!</span></h1>
                </div>
            </div>
        </div>
    </header>
</body>
</html>
